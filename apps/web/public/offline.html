<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta name="theme-color" content="#123c7a" />
    <title>Ativelo está offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top,
            rgba(33, 150, 243, 0.14),
            transparent 38%
          ),
          #f4f7fb;
      }

      main {
        width: min(460px, 100%);
        padding: 34px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        text-align: center;
      }

      img {
        width: 88px;
        height: 88px;
        border-radius: 22px;
      }

      h1 {
        margin: 22px 0 8px;
        font-size: clamp(1.7rem, 5vw, 2.2rem);
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }

      button {
        margin-top: 24px;
        min-height: 46px;
        padding: 0 20px;
        border: 0;
        border-radius: 13px;
        background: #123c7a;
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img
        src="/icons/ativelo-192.png"
        alt=""
        width="88"
        height="88"
      />
      <h1>Sem conexão</h1>
      <p>
        O Ativelo não conseguiu acessar a internet.
        Reconecte-se para consultar ou alterar informações.
      </p>
      <button type="button" onclick="window.location.reload()">
        Tentar novamente
      </button>
    </main>
  </body>
</html>
